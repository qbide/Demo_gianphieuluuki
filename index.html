	<!-- ==================== LIGHTWEIGHT DEBUG SYSTEM ==================== -->
	<!-- Activated by: ?debug=1 | 7 taps top-left in 3s | hold bottom-right 3s -->
	<style id="__dbg_style">
	#__dbg_btn{position:fixed;top:8px;right:8px;z-index:999999;background:rgba(255,80,0,.9);color:#fff;font:bold 11px/1 monospace;padding:5px 8px;border-radius:4px;border:none;cursor:pointer;display:none;touch-action:none;user-select:none;}
	#__dbg_panel{position:fixed;top:0;right:0;bottom:0;z-index:999998;width:min(360px,100vw);background:rgba(10,10,10,.96);color:#e0e0e0;font:11px/1.4 monospace;display:none;flex-direction:column;border-left:1px solid #333;box-sizing:border-box;}
	#__dbg_panel.open{display:flex;}
	#__dbg_tabs{display:flex;flex-wrap:wrap;border-bottom:1px solid #333;flex-shrink:0;}
	#__dbg_tabs button{flex:1;min-width:0;padding:5px 2px;background:none;border:none;border-bottom:2px solid transparent;color:#aaa;font:10px monospace;cursor:pointer;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
	#__dbg_tabs button.active{color:#ff5000;border-bottom-color:#ff5000;}
	#__dbg_body{flex:1;overflow-y:auto;padding:6px;}
	#__dbg_toolbar{display:flex;gap:4px;padding:4px;border-top:1px solid #333;flex-shrink:0;flex-wrap:wrap;}
	#__dbg_toolbar button{padding:4px 6px;background:#222;color:#ccc;border:1px solid #444;border-radius:3px;font:10px monospace;cursor:pointer;}
	#__dbg_toolbar button:active{background:#333;}
	.__dbg_entry{padding:2px 0;border-bottom:1px solid #1a1a1a;word-break:break-all;}
	.__dbg_entry.log{color:#e0e0e0;}
	.__dbg_entry.warn{color:#ffcc00;}
	.__dbg_entry.error{color:#ff5555;}
	.__dbg_entry.info{color:#55aaff;}
	.__dbg_entry.net{color:#55ffaa;}
	.__dbg_entry.net.fail{color:#ff7777;}
	.__dbg_entry .ts{color:#666;font-size:9px;margin-right:4px;}

	<script>
	(function(){
	'use strict';

	// ---- State ----
	var _activated = false;
	var _panelOpen = false;
	var _activeTab = 'Logs';
	var TABS = ['Logs','Errors','Network','Perf','Device','WebGL','Memory'];

	window.DEBUG_LOGS = [];

	// ---- Activation detection ----
	var _tapTimes = [];
	var _holdTimer = null;

	function _activate(){
		if(_activated) return;
		_activated = true;
		_buildUI();
		_runDeviceLog();
		_runWebGLLog();
		_runPerfLog();
		_runMemoryLog();
		_log('sys','Debug activated at '+_ts()+'ms');
	}

	// URL check
	try{
		if(/[?&]debug=1/.test(location.search)||/[?&]debug=1/.test(location.hash)){
			// defer so page can start loading first
			setTimeout(_activate,0);
		}
	}catch(e){}

	// Touch: 7 taps in top-left 80x80px in 3s
	document.addEventListener('touchstart',function(e){
		var t=e.touches[0];
		if(t&&t.clientX<80&&t.clientY<80){
			var now=Date.now();
			_tapTimes.push(now);
			_tapTimes=_tapTimes.filter(function(x){return now-x<3000;});
			if(_tapTimes.length>=7){_tapTimes=[];_activate();}
		}
	},{passive:true});

	// Touch: hold bottom-right 3s
	document.addEventListener('touchstart',function(e){
		var t=e.touches[0];
		if(!t) return;
		var W=window.innerWidth,H=window.innerHeight;
		if(t.clientX>W-80&&t.clientY>H-80){
			_holdTimer=setTimeout(_activate,3000);
		}
	},{passive:true});
	document.addEventListener('touchend',function(){clearTimeout(_holdTimer);},{passive:true});
	document.addEventListener('touchmove',function(){clearTimeout(_holdTimer);},{passive:true});

	// ---- Timestamp ----
	var _t0 = performance.now();
	function _ts(){return (performance.now()-_t0).toFixed(1);}

	// ---- Core logger ----
	function _log(type,msg,extra){
		var entry={ts:+_ts(),type:type,msg:String(msg),extra:extra||null};
		window.DEBUG_LOGS.push(entry);
		if(_activated) _renderCurrent();
	}

	// ---- Hook console ----
	var _con={log:console.log,warn:console.warn,error:console.error,info:console.info};
	['log','warn','error','info'].forEach(function(m){
		console[m]=function(){
			var args=Array.prototype.slice.call(arguments);
			var txt=args.map(function(a){
				try{return(typeof a==='object')?JSON.stringify(a):String(a);}catch(e){return String(a);}
			}).join(' ');
			_log(m,txt);
			_con[m].apply(console,args);
		};
	});

	// ---- Hook errors ----
	window.addEventListener('error',function(e){
		_log('error','[ERROR] '+e.message+'\n  '+e.filename+':'+e.lineno+':'+e.colno+(e.error&&e.error.stack?'\n'+e.error.stack:''));
	});
	window.addEventListener('unhandledrejection',function(e){
		var r=e.reason;
		var msg='[UNHANDLED REJECTION] '+(r instanceof Error?r.message+'\n'+r.stack:String(r));
		_log('error',msg);
	});

	// ---- Hook fetch ----
	var _origFetch=window.fetch;
	window.fetch=function(input,init){
		var url=typeof input==='string'?input:(input&&input.url)||'unknown';
		var method=(init&&init.method)||'GET';
		var t0=performance.now();
		return _origFetch.apply(this,arguments).then(function(res){
			var dur=(performance.now()-t0).toFixed(0);
			_log('net','[FETCH '+method+'] '+url+' → '+res.status+' ('+dur+'ms)');
			return res;
		},function(err){
			var dur=(performance.now()-t0).toFixed(0);
			_log('net','[FETCH FAIL '+method+'] '+url+' '+err+' ('+dur+'ms)');
			throw err;
		});
	};

	// ---- Hook XHR ----
	var _origOpen=XMLHttpRequest.prototype.open;
	var _origSend=XMLHttpRequest.prototype.send;
	XMLHttpRequest.prototype.open=function(method,url){
		this.__dbg_method=method;this.__dbg_url=url;this.__dbg_t0=0;
		return _origOpen.apply(this,arguments);
	};
	XMLHttpRequest.prototype.send=function(){
		var self=this;
		self.__dbg_t0=performance.now();
		self.addEventListener('loadend',function(){
			var dur=(performance.now()-self.__dbg_t0).toFixed(0);
			var ok=self.status>=200&&self.status<400;
			_log('net','[XHR '+(ok?'OK':'FAIL')+' '+(self.__dbg_method||'?')+'] '+(self.__dbg_url||'?')+' → '+(self.status||0)+' ('+dur+'ms'+(self.responseURL&&self.responseURL!==self.__dbg_url?' → '+self.responseURL:'')+')');
		});
		return _origSend.apply(this,arguments);
	};

	// ---- Hook WebAssembly ----
	try{
		if(typeof WebAssembly!=='undefined'){
			['compile','compileStreaming','instantiate','instantiateStreaming'].forEach(function(m){
				if(typeof WebAssembly[m]==='function'){
					var orig=WebAssembly[m];
					WebAssembly[m]=function(){
						var t0=performance.now();
						return orig.apply(WebAssembly,arguments).then(function(r){
							_log('log','[WASM '+m+'] ok '+(performance.now()-t0).toFixed(0)+'ms');
							return r;
						},function(e){
							_log('error','[WASM '+m+' FAIL] '+e);
							throw e;
						});
					};
				}
			});
		}
	}catch(e){}

	// ---- Performance timeline ----
	function _runPerfLog(){
		try{
			var nav=performance.getEntriesByType('navigation')[0];
			if(nav){
				_log('log','[PERF] DNS: '+nav.domainLookupEnd.toFixed(0)+'-'+nav.domainLookupStart.toFixed(0)+'='+(nav.domainLookupEnd-nav.domainLookupStart).toFixed(0)+'ms');
				_log('log','[PERF] TCP: '+(nav.connectEnd-nav.connectStart).toFixed(0)+'ms');
				_log('log','[PERF] SSL: '+(nav.secureConnectionStart>0?(nav.connectEnd-nav.secureConnectionStart).toFixed(0):'n/a')+'ms');
				_log('log','[PERF] TTFB: '+(nav.responseStart-nav.requestStart).toFixed(0)+'ms');
				_log('log','[PERF] Download: '+(nav.responseEnd-nav.responseStart).toFixed(0)+'ms');
				_log('log','[PERF] DOMContentLoaded: '+nav.domContentLoadedEventStart.toFixed(0)+'ms');
				_log('log','[PERF] Load: '+nav.loadEventStart.toFixed(0)+'ms');
			}
		}catch(e){}
		try{
			var res=performance.getEntriesByType('resource');
			res.forEach(function(r){
				_log('log','[RESOURCE] '+r.name.split('/').pop()+' '+r.duration.toFixed(0)+'ms size:'+(r.transferSize||0));
			});
		}catch(e){}
	}

	// ---- Visibility / lifecycle ----
	['visibilitychange','freeze','resume','pagehide','pageshow'].forEach(function(ev){
		document.addEventListener(ev,function(){_log('log','[PAGE] '+ev+(document.visibilityState?' ('+document.visibilityState+')':''));},{passive:true});
	});

	// ---- Device info ----
	function _runDeviceLog(){
		try{
			var n=navigator,s=screen,c=window.connection||n.connection||n.mozConnection||n.webkitConnection;
			var info=[
				'UA: '+n.userAgent,
				'Platform: '+n.platform,
				'Language: '+n.language,
				'Online: '+n.onLine,
				'Cores: '+(n.hardwareConcurrency||'?'),
				'DevMem: '+(n.deviceMemory||'?')+'GB',
				'Screen: '+s.width+'x'+s.height+' ratio:'+window.devicePixelRatio,
				'Viewport: '+window.innerWidth+'x'+window.innerHeight,
				'TZ: '+(Intl&&Intl.DateTimeFormat().resolvedOptions().timeZone||'?'),
				'ECT: '+(c?c.effectiveType||'?':'n/a'),
				'Downlink: '+(c?c.downlink||'?':'n/a')+'Mbps',
				'RTT: '+(c?c.rtt||'?':'n/a')+'ms',
			];
			info.forEach(function(l){_log('log','[DEVICE] '+l);});
		}catch(e){}
		try{
			_log('log','[CROSS-ORIGIN] isolated:'+window.crossOriginIsolated+' SAB:'+(typeof SharedArrayBuffer!=='undefined'));
		}catch(e){}
	}

	// ---- WebGL info ----
	function _runWebGLLog(){
		try{
			var cv=document.createElement('canvas');
			var gl=cv.getContext('webgl')||cv.getContext('experimental-webgl');
			if(gl){
				var d=gl.getExtension('WEBGL_debug_renderer_info');
				_log('log','[WEBGL] Vendor: '+(d?gl.getParameter(d.UNMASKED_VENDOR_WEBGL):'n/a'));
				_log('log','[WEBGL] Renderer: '+(d?gl.getParameter(d.UNMASKED_RENDERER_WEBGL):'n/a'));
				_log('log','[WEBGL] Version: '+gl.getParameter(gl.VERSION));
				_log('log','[WEBGL] MaxTex: '+gl.getParameter(gl.MAX_TEXTURE_SIZE));
				_log('log','[WEBGL] MaxTexUnits: '+gl.getParameter(gl.MAX_TEXTURE_IMAGE_UNITS));
				var mainCanvas=document.getElementById('canvas');
				if(mainCanvas){
					mainCanvas.addEventListener('webglcontextlost',function(){_log('error','[WEBGL] Context LOST');});
					mainCanvas.addEventListener('webglcontextrestored',function(){_log('log','[WEBGL] Context RESTORED');});
				}
			} else {
				_log('error','[WEBGL] Not available');
			}
		}catch(e){}
	}

	// ---- Memory ----
	function _runMemoryLog(){
		try{
			if(performance.memory){
				var m=performance.memory;
				_log('log','[MEM] used:'+Math.round(m.usedJSHeapSize/1048576)+'MB total:'+Math.round(m.totalJSHeapSize/1048576)+'MB limit:'+Math.round(m.jsHeapSizeLimit/1048576)+'MB');
			}
		}catch(e){}
	}

	// ---- Audio context ----
	try{
		var _OrigAC=window.AudioContext||window.webkitAudioContext;
		if(_OrigAC){
			var _PatchedAC=function(){
				var ac=new _OrigAC(...arguments);
				_log('log','[AUDIO] AudioContext created state:'+ac.state);
				var _origResume=ac.resume.bind(ac);
				ac.resume=function(){
					return _origResume().then(function(){_log('log','[AUDIO] resumed');},function(e){_log('error','[AUDIO] resume fail: '+e);});
				};
				ac.addEventListener('statechange',function(){_log('log','[AUDIO] state → '+ac.state);});
				return ac;
			};
			_PatchedAC.prototype=_OrigAC.prototype;
			window.AudioContext=_PatchedAC;
			window.webkitAudioContext=_PatchedAC;
		}
	}catch(e){}

	// ---- Page timing markers ----
	_log('log','[INIT] HTML parsed at '+_ts()+'ms');
	document.addEventListener('DOMContentLoaded',function(){_log('log','[INIT] DOMContentLoaded at '+_ts()+'ms');});
	window.addEventListener('load',function(){_log('log','[INIT] Load event at '+_ts()+'ms');});

	// ---- Service Worker ----
	try{
		if('serviceWorker' in navigator){
			var _origSWReg=navigator.serviceWorker.register.bind(navigator.serviceWorker);
			navigator.serviceWorker.register=function(url,opts){
				_log('log','[SW] registering: '+url);
				return _origSWReg(url,opts).then(function(r){
					_log('log','[SW] registered OK');return r;
				},function(e){
					_log('error','[SW] failed: '+e);throw e;
				});
			};
		}
	}catch(e){}

	// ---- UI Builder ----
	function _buildUI(){
		// Button
		var btn=document.createElement('button');
		btn.id='__dbg_btn';
		btn.textContent='DEBUG';
		btn.style.display='block';
		btn.addEventListener('click',_togglePanel);
		document.body.appendChild(btn);

		// Panel
		var panel=document.createElement('div');
		panel.id='__dbg_panel';

		// Tabs
		var tabRow=document.createElement('div');
		tabRow.id='__dbg_tabs';
		TABS.forEach(function(t){
			var b=document.createElement('button');
			b.textContent=t;
			b.dataset.tab=t;
			if(t===_activeTab) b.className='active';
			b.addEventListener('click',function(){
				_activeTab=t;
				tabRow.querySelectorAll('button').forEach(function(x){x.className=x.dataset.tab===t?'active':'';});
				_renderCurrent();
			});
			tabRow.appendChild(b);
		});
		panel.appendChild(tabRow);

		// Body
		var body=document.createElement('div');
		body.id='__dbg_body';
		panel.appendChild(body);

		// Toolbar
		var bar=document.createElement('div');
		bar.id='__dbg_toolbar';
		[['Copy Logs',_copyLogs],['Export JSON',_exportJSON],['Clear',_clearLogs],['Hide',_togglePanel]].forEach(function(pair){
			var b=document.createElement('button');
			b.textContent=pair[0];
			b.addEventListener('click',pair[1]);
			bar.appendChild(b);
		});
		panel.appendChild(bar);

		document.body.appendChild(panel);
		_renderCurrent();
	}

	function _togglePanel(){
		_panelOpen=!_panelOpen;
		var panel=document.getElementById('__dbg_panel');
		if(panel) panel.className=_panelOpen?'open':'';
		if(_panelOpen) _renderCurrent();
	}

	function _tabFilter(entry){
		var t=_activeTab;
		if(t==='Logs') return entry.type==='log'||entry.type==='info'||entry.type==='warn';
		if(t==='Errors') return entry.type==='error';
		if(t==='Network') return entry.type==='net';
		if(t==='Perf') return entry.type==='log'&&/\[PERF\]|\[RESOURCE\]|\[INIT\]/.test(entry.msg);
		if(t==='Device') return entry.type==='log'&&/\[DEVICE\]|\[CROSS-ORIGIN\]/.test(entry.msg);
		if(t==='WebGL') return /\[WEBGL\]/.test(entry.msg);
		if(t==='Memory') return /\[MEM\]/.test(entry.msg);
		return false;
	}

	function _renderCurrent(){
		if(!_panelOpen) return;
		var body=document.getElementById('__dbg_body');
		if(!body) return;
		var filtered=window.DEBUG_LOGS.filter(_tabFilter);
		var html='';
		filtered.forEach(function(e){
			var cls='__dbg_entry '+(e.type==='net'&&/FAIL/.test(e.msg)?'net fail':e.type);
			html+='<div class="'+cls+'"><span class="ts">'+e.ts+'ms</span>'+_esc(e.msg)+'</div>';
		});
		body.innerHTML=html||'<div style="color:#555;padding:8px">No entries</div>';
		body.scrollTop=body.scrollHeight;
	}

	function _esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}

	function _copyLogs(){
		try{
			var txt=window.DEBUG_LOGS.map(function(e){return e.ts+'ms ['+e.type+'] '+e.msg;}).join('\n');
			navigator.clipboard.writeText(txt).catch(function(){_fallbackCopy(txt);});
		}catch(e){_fallbackCopy(window.DEBUG_LOGS.map(function(e){return e.ts+'ms ['+e.type+'] '+e.msg;}).join('\n'));}
	}

	function _fallbackCopy(txt){
		var ta=document.createElement('textarea');
		ta.value=txt;ta.style.position='fixed';ta.style.opacity='0';
		document.body.appendChild(ta);ta.select();
		try{document.execCommand('copy');}catch(e){}
		document.body.removeChild(ta);
	}

	function _exportJSON(){
		try{
			var json=JSON.stringify({exported:new Date().toISOString(),logs:window.DEBUG_LOGS},null,2);
			var blob=new Blob([json],{type:'application/json'});
			var url=URL.createObjectURL(blob);
			var a=document.createElement('a');
			a.href=url;a.download='debug_logs_'+Date.now()+'.json';
			document.body.appendChild(a);a.click();
			setTimeout(function(){document.body.removeChild(a);URL.revokeObjectURL(url);},1000);
		}catch(e){_log('error','Export failed: '+e);}
	}

	function _clearLogs(){
		window.DEBUG_LOGS=[];
		_renderCurrent();
	}

	})();
	</script>

		</noscript>

		<div id="status">
			<img id="status-splash" class="show-image--true fullsize--true use-filter--true" src="index.png" alt="">
			<progress id="status-progress"></progress>
			<div id="status-notice"></div>
		</div>

		<script src="index.js"></script>
		<script>
			// ==================== 1. HOOK WEBGL & RENDERER ====================
			(function() {
				const oldGetContext = HTMLCanvasElement.prototype.getContext;
				HTMLCanvasElement.prototype.getContext = function(type, ...args) {
					console.log("[WEBGL] getContext called:", type);
					const gl = oldGetContext.call(this, type, ...args);
					console.log("[WEBGL] getContext result:", gl ? "SUCCESS" : "NULL/FAILED", gl);
					return gl;
				};
			
				if (typeof WebGLRenderingContext !== 'undefined') {
					const oldCompile = WebGLRenderingContext.prototype.compileShader;
					WebGLRenderingContext.prototype.compileShader = function(shader) {
						console.log("[GL1] compileShader");
						return oldCompile.call(this, shader);
					};
				}
			
				if (typeof WebGL2RenderingContext !== 'undefined') {
					const oldCompile2 = WebGL2RenderingContext.prototype.compileShader;
					WebGL2RenderingContext.prototype.compileShader = function(shader) {
						console.log("[GL2] compileShader");
						return oldCompile2.call(this, shader);
					};
				}
			})();
			
			// ==================== 2. HOOK AUDIO & RAF ====================
			(function() {
				const OrigAC = window.AudioContext || window.webkitAudioContext;
				if (OrigAC) {
					const oldResume = OrigAC.prototype.resume;
					OrigAC.prototype.resume = function() {
						console.log("[AUDIO] resume called");
						return oldResume.call(this);
					};
				}
			
				const oldRAF = window.requestAnimationFrame;
				let rafCount = 0;
				window.requestAnimationFrame = function(cb) {
					if (rafCount < 3) {
						console.log("[RAF] First frame animation requested");
						rafCount++;
					}
					return oldRAF(cb);
				};
			})();
			
			// ==================== 3. GODOT INIT & WATCHDOG ====================
			const GODOT_CONFIG = {"args":[],"canvasResizePolicy":2,"emscriptenPoolSize":8,"ensureCrossOriginIsolationHeaders":false,"executable":"index","experimentalVK":false,"fileSizes":{"index.pck":43557092,"index.wasm":37896978},"focusCanvas":true,"gdextensionLibs":[],"godotPoolSize":4};
			const GODOT_THREADS_ENABLED = false;
			
			const engine = new Engine(GODOT_CONFIG);
			console.log("[A] Engine created:", engine);
			
			(function () {
				const statusOverlay = document.getElementById('status');
				const statusProgress = document.getElementById('status-progress');
				const statusNotice = document.getElementById('status-notice');
			
				let initializing = true;
				let statusMode = '';
			
				function setStatusMode(mode) {
					if (statusMode === mode || !initializing) {
						return;
					}
					if (mode === 'hidden') {
						statusOverlay.remove();
						initializing = false;
						return;
					}
					statusOverlay.style.visibility = 'visible';
					statusProgress.style.display = mode === 'progress' ? 'block' : 'none';
					statusNotice.style.display = mode === 'notice' ? 'block' : 'none';
					statusMode = mode;
				}
			
				function setStatusNotice(text) {
					while (statusNotice.lastChild) {
						statusNotice.removeChild(statusNotice.lastChild);
					}
					const lines = text.split('\n');
					lines.forEach((line) => {
						statusNotice.appendChild(document.createTextNode(line));
						statusNotice.appendChild(document.createElement('br'));
					});
				}
			
				function displayFailureNotice(err) {
					console.error("[GODOT DISPLAY FAILURE]", err);
					if (err instanceof Error) {
						setStatusNotice(err.message);
					} else if (typeof err === 'string') {
						setStatusNotice(err);
					} else {
						setStatusNotice('An unknown error occurred.');
					}
					setStatusMode('notice');
					initializing = false;
				}
			
				const missing = Engine.getMissingFeatures({
					threads: GODOT_THREADS_ENABLED,
				});
			
				if (missing.length !== 0) {
					if (GODOT_CONFIG['serviceWorker'] && GODOT_CONFIG['ensureCrossOriginIsolationHeaders'] && 'serviceWorker' in navigator) {
						let serviceWorkerRegistrationPromise;
						try {
							serviceWorkerRegistrationPromise = navigator.serviceWorker.getRegistration();
						} catch (err) {
							serviceWorkerRegistrationPromise = Promise.reject(new Error('Service worker registration failed.'));
						}
						Promise.race([
							serviceWorkerRegistrationPromise.then((registration) => {
								if (registration != null) {
									return Promise.reject(new Error('Service worker already exists.'));
								}
								return registration;
							}).then(() => engine.installServiceWorker()),
							new Promise((resolve) => {
								setTimeout(() => resolve(), 2000);
							}),
						]).then(() => {
							window.location.reload();
						}).catch((err) => {
							console.error('[SW ERROR]', err);
							displayFailureNotice(err);
						});
					} else {
						const missingMsg = 'Error\nThe following features required to run Godot projects on the Web are missing:\n';
						displayFailureNotice(missingMsg + missing.join('\n'));
					}
				} else {
					setStatusMode('progress');
			
					console.log("[B] About to call startGame()");
					const startTime = performance.now();
			
					// Watchdog đếm nhịp mỗi 5 giây
					const watchdog = setInterval(() => {
						console.warn(`[GODOT WATCHDOG] startGame() vẫn pending sau ${Math.round(performance.now() - startTime)} ms`);
					}, 5000);
			
					// Khởi chạy game
					const p = engine.startGame({
						'onProgress': function (current, total) {
							if (current > 0 && total > 0) {
								statusProgress.value = current;
								statusProgress.max = total;
								var pct = ((current / total) * 100).toFixed(2);
								if (window.__last_pct !== pct) {
									window.__last_pct = pct;
									console.log(`[GODOT Loading] ${pct}% (${current}/${total} bytes)`);
								}
							} else {
								statusProgress.removeAttribute('value');
								statusProgress.removeAttribute('max');
							}
						},
					});
			
					console.log("[C] startGame() returned promise:", p);
			
					p.then(() => {
						clearInterval(watchdog);
						console.log("[D] startGame RESOLVED successfully!");
						console.log(`[GODOT SUCCESS] Total time: ${Math.round(performance.now() - startTime)} ms`);
						setStatusMode('hidden');
					}).catch((e) => {
						clearInterval(watchdog);
						console.error("[E] startGame REJECTED:", e);
						displayFailureNotice(e);
					});
				}
			}());
			</script>
	</body>
</html>
